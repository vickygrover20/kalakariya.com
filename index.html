<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalakariya | Premium Home Décor</title>

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
}

/* NAVBAR */
nav {
  background: #000;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #222;
}
nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}
nav a:hover { color: #ff0000; }

/* HEADER */
header {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1616627987410-7a4c98a1c2d2') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}
header::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}
header div { position: relative; z-index: 1; }
header h1 { color: #ff0000; font-size: 3.5rem; }
header p { color: #fff; }

/* SECTION */
section { padding: 60px 20px; max-width: 1100px; margin: auto; }
h2 { text-align: center; color: #ff0000; }

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}
.card {
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}
.card:hover { border-color: #ff0000; transform: translateY(-5px); }
.card img { width: 100%; height: 220px; object-fit: cover; }
.card h3 { text-align: center; padding: 10px; }

/* CONTACT */
input, textarea {
  width: 100%; padding: 12px; margin: 10px 0;
  background: #111; border: 1px solid #444; color: #fff;
}
button {
  width: 100%; padding: 12px;
  background: #ff0000; color: white; border: none;
}

/* FOOTER */
footer { text-align: center; padding: 20px; color: #888; }

/* WHATSAPP */
.whatsapp {
  position: fixed; bottom: 20px; right: 20px;
  background: #25D366; color: white;
  padding: 12px; border-radius: 50px;
  text-decoration: none;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="catalogue.html">Catalogue</a>
  <a href="#contact">Contact</a>
</nav>

<header>
  <div>
    <h1>Kalakariya</h1>
    <p>Redefining Comfort & Elegance in Every Home</p>
  </div>
</header>

<section>
  <h2>Our Collection</h2>
  <div class="products">

    <a href="catalogue/bedsheets.pdf" target="_blank">
      <div class="card">
        <img src="images/bedsheet.jpg">
        <h3>Bedsheets</h3>
      </div>
    </a>

    <a href="catalogue/curtains.pdf" target="_blank">
      <div class="card">
        <img src="images/curtains.jpg">
        <h3>Curtains</h3>
      </div>
    </a>

    <a href="catalogue/sofa.pdf" target="_blank">
      <div class="card">
        <img src="images/sofa.jpg">
        <h3>Sofa Fabrics</h3>
      </div>
    </a>

    <a href="catalogue/comforter.pdf" target="_blank">
      <div class="card">
        <img src="images/comforter.jpg">
        <h3>Comforters</h3>
      </div>
    </a>

    <a href="catalogue/wedding.pdf" target="_blank">
      <div class="card">
        <img src="images/wedding.jpg">
        <h3>Wedding Sets</h3>
      </div>
    </a>

  </div>
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <form action="https://formspree.io/f/yourformid" method="POST">
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

<footer>
  © 2026 Kalakariya
</footer>

<a href="https://wa.me/919034840539" class="whatsapp">Chat</a>

</body>
</html>
